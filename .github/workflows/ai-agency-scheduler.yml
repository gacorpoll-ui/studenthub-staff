name: AI Agency Auto Job Hunter

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  run-agency:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './ai-agency-workflow/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./ai-agency-workflow
        run: npm install
        
      - name: Run Auto Job Hunter
        working-directory: ./ai-agency-workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FREETHEAI_API_KEY: ${{ secrets.FREETHEAI_API_KEY }}
        run: npm run auto-hunter
        
      - name: Commit and Push Cover Letters
        run: |
          git config --global user.name 'AI Agency Bot'
          git config --global user.email 'ai-agency@users.noreply.github.com'
          git add ai-agency-workflow/cover-letters/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 auto: Generate new job proposals/cover letters" && git push)
