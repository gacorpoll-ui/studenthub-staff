<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/company-list"></ion-back-button>
    </ion-buttons>
    <ion-title *ngIf="store">{{ store.store_name }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="update()">
        Update
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <section *ngIf="store">
    <ion-item>
      <ion-label>
        <h3>Store Name</h3>
        <p>{{ store.store_name }}</p>
      </ion-label>
    </ion-item>
    
    <ion-item>
      <ion-label>
        <h3>Store Location</h3>
        <p *ngIf="store.store_location">{{ store.store_location }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h3>Brand Name</h3>
        <p *ngIf="store.brand">{{ store.brand.brand_name_en }}</p>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        <h3>Mall Name</h3>
        <p *ngIf="store.mall">{{ store.mall.mall_name_en }}</p>
      </ion-label>
    </ion-item>

  </section>
  <ion-list *ngIf="store">

    <ion-item-divider color="light">
      <ion-label>
        Candidates &nbsp; <ion-badge color="dark" *ngIf="store.candidates">{{ store.candidates.length }}</ion-badge>
      </ion-label>
    </ion-item-divider>

    <candidate [candidate]="candidate" (refresh)="loadData()" *ngFor="let candidate of store.candidates"></candidate>

  </ion-list>

  <loading-modal [loading]="loading" type="candidate-list"></loading-modal>

</ion-content>
